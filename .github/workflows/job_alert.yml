name: 4-Hour Job Tracker

on:
  schedule:
    - cron: '0 */4 * * *'  # Runs automatically every 4 hours
  workflow_dispatch:      # Allows manual trigger button for testing

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Job Scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit and Push Updated Seen Jobs File
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_jobs.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: update seen jobs state [skip ci]" && git push)
